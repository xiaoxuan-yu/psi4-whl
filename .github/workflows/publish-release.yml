name: publish-release

on:
  workflow_dispatch:
    inputs:
      run-id:
        description: "Successful build-wheel run ID to publish from"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build metadata
        uses: actions/download-artifact@v4
        with:
          name: build-metadata
          run-id: ${{ inputs.run-id }}
          github-token: ${{ github.token }}
          path: build-metadata

      - id: meta
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          data = json.loads(Path("build-metadata/wheel-build-metadata.json").read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"overlay_ref={data['overlay_ref']}\n")
              handle.write(f"release_tag={data['release_tag']}\n")
              handle.write(f"release_version={data['release_version']}\n")
          PY

      - name: Pin repository to build overlay ref
        run: |
          git fetch origin "${{ steps.meta.outputs.overlay_ref }}" --depth=1
          git checkout --detach FETCH_HEAD

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          run-id: ${{ inputs.run-id }}
          github-token: ${{ github.token }}
          merge-multiple: true
          path: wheelhouse

      - name: Install verification helper
        run: python -m pip install packaging

      - name: Verify wheelhouse
        run: python devtools/scripts/verify_wheelhouse.py wheelhouse --expect-version "${{ steps.meta.outputs.release_version }}"

      - name: Render release notes from upstream release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const tag = process.env.RELEASE_TAG;
            const upstream = await github.rest.repos.getReleaseByTag({
              owner: "psi4",
              repo: "psi4",
              tag,
            });
            const body = [
              `Prebuilt \`psi4-whl\` wheels for upstream Psi4 ${tag}.`,
              "",
              `Upstream release: ${upstream.data.html_url}`,
              "",
              "The published distribution name is `psi4-whl`; the Python import remains `psi4`.",
              "",
              "---",
              "",
              upstream.data.body || "",
            ].join("\n");
            fs.writeFileSync("release-body.md", body);

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          body_path: release-body.md
          files: wheelhouse/*.whl
          fail_on_unmatched_files: true
          overwrite_files: true

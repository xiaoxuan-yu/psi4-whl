name: build-wheel

on:
  push:
    tags:
      - "v*"
  repository_dispatch:
    types:
      - build-wheel
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream Psi4 release tag to build, e.g. v1.10"
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      overlay_ref: ${{ steps.meta.outputs.overlay_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - id: meta
        env:
          CLIENT_TAG: ${{ github.event.client_payload.tag }}
          CLIENT_OVERLAY_REF: ${{ github.event.client_payload.overlay_ref }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch)
              release_tag="$MANUAL_TAG"
              overlay_ref="$GITHUB_SHA"
              ;;
            repository_dispatch)
              release_tag="$CLIENT_TAG"
              overlay_ref="${CLIENT_OVERLAY_REF:-$GITHUB_SHA}"
              ;;
            push)
              release_tag="$GITHUB_REF_NAME"
              overlay_ref="$GITHUB_SHA"
              ;;
            *)
              echo "Unsupported event: $GITHUB_EVENT_NAME" >&2
              exit 1
              ;;
          esac

          if [[ -z "$release_tag" ]]; then
            echo "release tag is empty" >&2
            exit 1
          fi
          if [[ "$release_tag" != v* ]]; then
            echo "release tag must start with v: $release_tag" >&2
            exit 1
          fi

          release_version="${release_tag#v}"

          {
            echo "overlay_ref=$overlay_ref"
            echo "release_tag=$release_tag"
            echo "release_version=$release_version"
          } >> "$GITHUB_OUTPUT"

          cat > wheel-build-metadata.json <<EOF
          {
            "overlay_ref": "$overlay_ref",
            "release_tag": "$release_tag",
            "release_version": "$release_version"
          }
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: wheel-build-metadata.json
          if-no-files-found: error
          retention-days: 30

  build-linux-x86_64:
    name: Linux x86_64
    needs: resolve
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    defaults:
      run:
        shell: bash -l {0}
    env:
      OVERLAY_REF: ${{ needs.resolve.outputs.overlay_ref }}
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.release_version }}
      MANYLINUX_PYTHON_BIN: /opt/python/cp311-cp311/bin
      MANYLINUX_PYTHON: /opt/python/cp311-cp311/bin/python
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.overlay_ref }}
          fetch-depth: 0

      - name: Materialize upstream tag with wheel overlay
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git show "${OVERLAY_REF}:.github/psi4-whl-overlay-files.txt" > "$RUNNER_TEMP/psi4-whl-overlay-files.txt"
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/psi4/psi4.git
          else
            git remote add upstream https://github.com/psi4/psi4.git
          fi
          git fetch upstream "refs/tags/${RELEASE_TAG}"
          git checkout --detach FETCH_HEAD
          xargs git checkout "${OVERLAY_REF}" -- < "$RUNNER_TEMP/psi4-whl-overlay-files.txt"
          git status --short

      - name: Select manylinux CPython 3.11
        run: |
          test -x "${MANYLINUX_PYTHON}"
          "${MANYLINUX_PYTHON}" --version
          "${MANYLINUX_PYTHON}" -m pip --version

      - name: Install YAML helper
        run: |
          "${MANYLINUX_PYTHON}" -m pip install PyYAML

      - name: Write wheel build environment
        run: |
          "${MANYLINUX_PYTHON}" conda/psi4-path-advisor.py env \
            --name p4build \
            --python 3.11 \
            --platform linux-64 \
            --disable docs \
            --offline-conda
          "${MANYLINUX_PYTHON}" devtools/scripts/prepare_wheel_env.py env_p4build.yaml

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: p4build
          auto-activate-base: false
          channels: conda-forge
          conda-remove-defaults: true
          environment-file: env_p4build.yaml
          show-channel-urls: true

      - name: Install wheel build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "scikit-build-core>=0.12.2" auditwheel
          conda remove psi4 --force || true

      - name: Build wheel
        run: |
          python conda/psi4-path-advisor.py cache --objdir objdir --insist
          export CMAKE_ARGS="-C ${GITHUB_WORKSPACE}/cache_p4build@objdir.cmake -D CMAKE_VERBOSE_MAKEFILE=OFF -D psi4_ENABLE_PRECOMPILE_HEADERS=ON"
          python -m build --wheel --no-isolation

      - name: Repair wheel
        run: |
          mkdir -p wheelhouse
          auditwheel repair -w wheelhouse dist/*.whl
          ls -1 wheelhouse

      - name: Smoke test repaired wheel
        run: |
          smoke_dir="$RUNNER_TEMP/psi4-smoke"
          python -m venv "$smoke_dir"
          source "$smoke_dir/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install --only-binary=:all: "$GITHUB_WORKSPACE"/wheelhouse/*.whl
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE"/devtools/scripts/smoke_test_wheel.py --expect-version "$RELEASE_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 30

  build-macos:
    name: ${{ matrix.name }}
    needs: resolve
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x86_64
            runs_on: macos-15-intel
            platform: osx-64
            python_version: "3.11"
            arch: x86_64
            artifact_name: wheel-macos-x86_64
            extra_cmake_args: "-D CMAKE_OSX_ARCHITECTURES=x86_64 -D CMAKE_CXX_FLAGS=-Wno-deprecated-declarations -D CMAKE_SHARED_LINKER_FLAGS=-Wl,-w"
          - name: macOS arm64
            runs_on: macos-15
            platform: osx-arm64
            python_version: "3.11"
            arch: arm64
            artifact_name: wheel-macos-arm64
            extra_cmake_args: "-D CMAKE_OSX_ARCHITECTURES=arm64 -D CMAKE_CXX_FLAGS=-Wno-deprecated-declarations -D CMAKE_SHARED_LINKER_FLAGS=-Wl,-w"
    defaults:
      run:
        shell: bash -l {0}
    env:
      OVERLAY_REF: ${{ needs.resolve.outputs.overlay_ref }}
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.overlay_ref }}
          fetch-depth: 0

      - name: Materialize upstream tag with wheel overlay
        run: |
          git show "${OVERLAY_REF}:.github/psi4-whl-overlay-files.txt" > "$RUNNER_TEMP/psi4-whl-overlay-files.txt"
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/psi4/psi4.git
          else
            git remote add upstream https://github.com/psi4/psi4.git
          fi
          git fetch upstream "refs/tags/${RELEASE_TAG}"
          git checkout --detach FETCH_HEAD
          xargs git checkout "${OVERLAY_REF}" -- < "$RUNNER_TEMP/psi4-whl-overlay-files.txt"
          git status --short

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install YAML helper
        run: python -m pip install PyYAML

      - name: Write wheel build environment
        run: |
          python conda/psi4-path-advisor.py env \
            --name p4build \
            --python "${{ matrix.python_version }}" \
            --platform "${{ matrix.platform }}" \
            --disable docs \
            --offline-conda
          python devtools/scripts/prepare_wheel_env.py env_p4build.yaml

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: p4build
          auto-activate-base: false
          channels: conda-forge
          conda-remove-defaults: true
          environment-file: env_p4build.yaml
          show-channel-urls: true

      - name: Install wheel build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "scikit-build-core>=0.12.2" delocate
          conda remove psi4 --force || true

      - name: Build wheel
        run: |
          numpy_include="$(python -c 'import numpy; print(numpy.get_include())')"
          python conda/psi4-path-advisor.py cache --objdir objdir --insist
          export CMAKE_ARGS="-C ${GITHUB_WORKSPACE}/cache_p4build@objdir.cmake -D CMAKE_VERBOSE_MAKEFILE=OFF -D psi4_ENABLE_PRECOMPILE_HEADERS=ON -D Python_NumPy_INCLUDE_DIR=${numpy_include} ${{ matrix.extra_cmake_args }}"
          python -m build --wheel --no-isolation

      - name: Repair wheel
        run: |
          mkdir -p wheelhouse
          delocate-wheel -w wheelhouse dist/*.whl
          ls -1 wheelhouse

      - name: Smoke test repaired wheel
        run: |
          smoke_dir="$RUNNER_TEMP/psi4-smoke"
          python -m venv "$smoke_dir"
          source "$smoke_dir/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install --only-binary=:all: "$GITHUB_WORKSPACE"/wheelhouse/*.whl
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE"/devtools/scripts/smoke_test_wheel.py --expect-version "$RELEASE_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 30

  build-windows-x86_64:
    name: Windows x86_64
    needs: resolve
    runs-on: windows-2025
    defaults:
      run:
        shell: bash -l {0}
    env:
      OVERLAY_REF: ${{ needs.resolve.outputs.overlay_ref }}
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.overlay_ref }}
          fetch-depth: 0

      - name: Materialize upstream tag with wheel overlay
        run: |
          git show "${OVERLAY_REF}:.github/psi4-whl-overlay-files.txt" > "$RUNNER_TEMP/psi4-whl-overlay-files.txt"
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/psi4/psi4.git
          else
            git remote add upstream https://github.com/psi4/psi4.git
          fi
          git fetch upstream "refs/tags/${RELEASE_TAG}"
          git checkout --detach FETCH_HEAD
          xargs git checkout "${OVERLAY_REF}" -- < "$RUNNER_TEMP/psi4-whl-overlay-files.txt"
          git status --short

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install YAML helper
        run: python -m pip install PyYAML

      - name: Write wheel build environment
        run: |
          python conda/psi4-path-advisor.py env \
            --name p4build \
            --python 3.11 \
            --platform win-64 \
            --disable docs \
            --offline-conda
          python devtools/scripts/prepare_wheel_env.py env_p4build.yaml

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: p4build
          auto-activate-base: false
          channels: conda-forge
          conda-remove-defaults: true
          environment-file: env_p4build.yaml
          show-channel-urls: true

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install wheel build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "scikit-build-core>=0.12.2" delvewheel
          conda remove psi4 --force || true

      - name: Build wheel
        run: |
          python conda/psi4-path-advisor.py cache --objdir objdir --insist
          export CMAKE_ARGS="-C ${GITHUB_WORKSPACE}/cache_p4build@objdir.cmake -D CMAKE_VERBOSE_MAKEFILE=OFF -D psi4_ENABLE_PRECOMPILE_HEADERS=ON -D CMAKE_C_COMPILER=clang-cl -D CMAKE_CXX_COMPILER=clang-cl -D psi4_SKIP_ENABLE_Fortran=ON -D ENABLE_XHOST=OFF -D CMAKE_CXX_FLAGS=/arch:AVX"
          python -m build --wheel --no-isolation

      - name: Repair wheel
        run: |
          mkdir -p wheelhouse
          python -m delvewheel repair --add-path "$CONDA_PREFIX/Library/bin" --wheel-dir wheelhouse dist/*.whl
          ls -1 wheelhouse

      - name: Smoke test repaired wheel
        run: |
          smoke_dir="$RUNNER_TEMP/psi4-smoke"
          python -m venv "$smoke_dir"
          source "$smoke_dir/Scripts/activate"
          python -m pip install --upgrade pip
          python -m pip install --only-binary=:all: "$GITHUB_WORKSPACE"/wheelhouse/*.whl
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE"/devtools/scripts/smoke_test_wheel.py --expect-version "$RELEASE_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x86_64
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 30
